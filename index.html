<!DOCTYPE html>
<html>

<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive design for mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Page title -->
<title>Weather Dashboard</title>

<!-- Connect CSS file -->
<link rel="stylesheet" href="style.css">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- Chart.js for weather analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ===============================
     LOADING SCREEN
================================ -->

<div id="loader">

<div class="spinner"></div>

<p>Loading Weather Data...</p>

</div>


<!-- ===============================
     MAIN APP
================================ -->

<div class="app">

<div class="card">

<!-- App Title -->
<h2>Weather Dashboard</h2>


<!-- ===============================
     SEARCH SECTION
================================ -->

<div class="search">

<input id="cityInput" placeholder="Enter city name">

<button onclick="getWeather()">Search</button>

</div>


<!-- ===============================
     WEATHER INFORMATION
================================ -->

<div class="weather">

<!-- Weather Icon -->
<img id="weatherIcon" width="90">

<!-- Temperature -->
<h1 id="temp">--°C</h1>

<!-- Weather Condition -->
<p id="condition">Search a city</p>


<!-- Weather Details -->
<div class="details">

<div>
<p>Humidity</p>
<span id="humidity">--%</span>
</div>

<div>
<p>Wind</p>
<span id="wind">-- km/h</span>
</div>

<div>
<p>Sunrise</p>
<span id="sunrise">--</span>
</div>

<div>
<p>Sunset</p>
<span id="sunset">--</span>
</div>

</div>

</div>


<!-- ===============================
     WEATHER ANALYTICS
================================ -->

<h3>Weather Analytics</h3>

<!-- Temperature chart -->
<canvas id="tempChart"></canvas>

</div>

</div>


<!-- ===============================
     MAIN JAVASCRIPT
================================ -->

<script src="script.js"></script>

</body>
</html>
