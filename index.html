<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js for hourly temperature chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4facfe">

</head>

<body class="sunny">

<!-- Loading Screen -->
<div id="loader">
    <div class="spinner"></div>
    <p>Loading Weather...</p>
</div>

<div class="app">

<div class="card">

<!-- Weather animation layer -->
<div class="weather-animation"></div>

<!-- Search Section -->
<div class="search">

<input 
type="text" 
id="cityInput" 
placeholder="Enter city name">

<button onclick="getWeather()">Search</button>

</div>

<!-- Current Weather -->
<div class="weather">

<img id="weatherIcon" src="" alt="Weather Icon" width="80">

<h1 id="temperature">--°C</h1>

<p id="condition">Weather Condition</p>

</div>

<!-- Weather Details -->
<div class="details">

<div>
<p>Humidity</p>
<span id="humidity">--%</span>
</div>

<div>
<p>Wind</p>
<span id="wind">-- km/h</span>
</div>

<div>
<p>Pressure</p>
<span id="pressure">-- hPa</span>
</div>

<div>
<p>Feels Like</p>
<span id="feels">--°C</span>
</div>

</div>

<!-- 5 Day Forecast -->
<div class="forecast-container" id="forecastContainer">

<!-- Forecast cards will be added dynamically by JavaScript -->

</div>

<!-- Hourly Temperature Chart -->
<canvas id="hourlyChart"></canvas>

</div>

</div>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
<!-- connect JavaScript -->
<script src="script.js"></script>

</body>
</html>
