<!DOCTYPE html>
<html>

<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive design for mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Page title -->
<title>Weather Dashboard</title>

<!-- Link CSS file -->
<link rel="stylesheet" href="style.css">

<!-- PWA manifest file -->
<link rel="manifest" href="manifest.json">

<!-- Chart.js library for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- Loading Screen -->
<div id="loader">

<!-- Spinner animation -->
<div class="spinner"></div>

<!-- Loading message -->
<p>Loading Weather Data...</p>

</div>


<!-- Main App Container -->
<div class="app">

<div class="card">

<!-- App Title -->
<h2>Weather Dashboard</h2>


<!-- Search Section -->
<div class="search">

<!-- City input field -->
<input id="cityInput" placeholder="Enter city name">

<!-- Button to search weather -->
<button onclick="getWeather()">Search</button>

</div>


<!-- Weather Information -->
<div class="weather">

<!-- Temperature -->
<h1 id="temp">--°C</h1>

<!-- Weather condition -->
<p id="condition">Search a city</p>


<!-- Weather details -->
<div class="details">

<!-- Humidity -->
<div>
<p>Humidity</p>
<span id="humidity">--%</span>
</div>

<!-- Wind -->
<div>
<p>Wind</p>
<span id="wind">-- km/h</span>
</div>

<!-- Sunrise -->
<div>
<p>Sunrise</p>
<span id="sunrise">--</span>
</div>

<!-- Sunset -->
<div>
<p>Sunset</p>
<span id="sunset">--</span>
</div>

</div>

</div>

<!-- Weather chart -->
<h3>Weather Analytics</h3>

<!-- Canvas where graph will be drawn -->
<canvas id="tempChart"></canvas>

</div>

</div>

<!-- Connect JavaScript file -->
<script src="script.js"></script>

</body>
</html>
