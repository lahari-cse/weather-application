<!DOCTYPE html>
<html>

<head>

<!-- Basic Page Setup -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Weather Dashboard</title>

<!-- Connect CSS File -->
<link rel="stylesheet" href="style.css">

<!-- Connect PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Chart Library for Weather Analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- Loading Screen -->
<div id="loader">

<div class="spinner"></div>

<p>Loading Weather Data...</p>

</div>

<!-- Main App Container -->
<div class="app">

<div class="card">

<!-- App Title -->
<h2>Weather Dashboard</h2>

<!-- City Search Section -->
<div class="search">

<!-- City Input -->
<input id="cityInput" placeholder="Enter city name">

<!-- Search Button (calls JS function) -->
<button onclick="getWeather()">Search</button>

<!-- Voice Search Button -->
<button onclick="startVoice()">🎙</button>

</div>

<!-- Current Weather Section -->
<div class="weather">

<!-- Weather Icon -->
<img id="weatherIcon" width="80">

<!-- Temperature -->
<h1 id="temp">--°C</h1>

<!-- Weather Condition -->
<p id="condition">Loading...</p>

<!-- Weather Details -->
<div class="details">

<div>
<p>Humidity</p>
<span id="humidity">--%</span>
</div>

<div>
<p>Wind</p>
<span id="wind">-- km/h</span>
</div>

<div>
<p>Air Quality</p>
<span id="aqi">--</span>
</div>

<div>
<p>Sunrise</p>
<span id="sunrise">--</span>
</div>

<div>
<p>Sunset</p>
<span id="sunset">--</span>
</div>

</div>

</div>

<!-- 5 Day Forecast Section -->
<h3>5 Day Forecast</h3>

<div id="forecastContainer"></div>

<!-- Hourly Forecast Section -->
<h3>Hourly Forecast</h3>

<div id="hourlyForecast"></div>

<!-- Weather Analytics Charts -->
<h3>Weather Analytics</h3>

<canvas id="tempChart"></canvas>
<canvas id="humidityChart"></canvas>
<canvas id="windChart"></canvas>

</div>

</div>

<!-- Connect Main JavaScript File -->
<script src="script.js"></script>

</body>
</html>
