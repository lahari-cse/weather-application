<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="spinner"></div>
  <p>Loading Weather Data...</p>
</div>

<!-- Main App -->
<div class="app">
  <div class="card">
    <h2>Weather Dashboard</h2>

    <!-- Search -->
    <div class="search">
      <input id="cityInput" placeholder="Enter city name">
      <button onclick="getWeather()">Search</button>
      <button onclick="getCurrentLocation()">📍 Current Location</button>
    </div>

    <!-- Current Weather -->
    <div class="weather">
      <img id="weatherIcon" width="90">
      <h1 id="temp">--°C</h1>
      <p id="condition">Search a city</p>
      <div class="details">
        <div>
          <p>Humidity</p>
          <span id="humidity">--%</span>
        </div>
        <div>
          <p>Wind</p>
          <span id="wind">-- km/h</span>
        </div>
        <div>
          <p>Sunrise</p>
          <span id="sunrise">--</span>
        </div>
        <div>
          <p>Sunset</p>
          <span id="sunset">--</span>
        </div>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <h3>5-Day Forecast</h3>
    <div id="forecastContainer" class="forecast-container"></div>

    <!-- Hourly Chart -->
    <h3>Hourly Temperature</h3>
    <canvas id="tempChart"></canvas>

    <!-- Animated Effects -->
    <div id="weatherAnimation" class="weather-animation"></div>

  </div>
</div>
  <script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js')
    .then(reg => console.log('Service Worker Registered'))
    .catch(err => console.log('Service Worker registration failed:', err));
}
</script>
<!-- Connect javascript -->
<script src="script.js"></script>
</body>
</html>
